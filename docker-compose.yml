services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_PATH=/data/data.db
    volumes:
      - db-data:/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db-data:
